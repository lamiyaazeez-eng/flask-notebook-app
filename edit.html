<!DOCTYPE html>
<html>
<head>
    <title>Edit Note</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Edit Note</h1>
    <form method="POST">

        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
